# Charli3 ODV Client — ADA/USD feed, Cardano Preprod
#
# Local copy of the hackathon-resources reference config:
#   https://github.com/Charli3-Official/hackathon-resources/blob/main/configs/ada-usd-preprod.yml
#
# Differences from the upstream copy:
#   - ogmios_url and kupo_url point at the public hackathon synced
#     instance (35.209.192.203) rather than the private internal
#     address (10.20.0.4) the upstream config ships with.
#   - wallet.mnemonic uses shell-style $WALLET_MNEMONIC expansion so
#     the mnemonic never lands in this file on disk. Operators set
#     the env var before invoking `charli3 aggregate`.
#
# Every other field is taken verbatim from the upstream config.

network:
  network: "testnet"
  ogmios_kupo:
    ogmios_url: "ws://35.209.192.203:1337"
    kupo_url: "http://35.209.192.203:1442"

wallet:
